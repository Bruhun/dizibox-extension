name: Build

permissions:
  contents: write

concurrency:
  group: "build"
  cancel-in-progress: true

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - '*.md'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: "src"

      - name: Checkout builds
        uses: actions/checkout@v4
        with:
          ref: "builds"
          path: "builds"

      - name: Clean old builds
        run: rm -f "$GITHUB_WORKSPACE/builds/"*.cs3

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Plugins
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/src"
          chmod +x gradlew
          ./gradlew make makePluginsJson --stacktrace --info
          find . -type f -path "*/build/*.cs3" -exec cp {} "$GITHUB_WORKSPACE/builds/" \;
          cp build/plugins.json "$GITHUB_WORKSPACE/builds"

      - name: Generate repository manifest
        shell: bash
        run: |
          set -euo pipefail
          cat > "$GITHUB_WORKSPACE/builds/repository.json" <<'EOF'
          {
            "name": "Dizibox Extension",
            "description": "Dizibox dizi ve film eklentisi - Turkish series & movies provider",
            "manifestVersion": 1,
            "iconUrl": "https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/builds/icon.png",
            "pluginLists": [
              "https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/builds/plugins.json"
            ]
          }
          EOF

      - name: Push builds
        run: |
          cd $GITHUB_WORKSPACE/builds
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add .
          git commit --amend -m "Build $GITHUB_SHA" || exit 0
          git push --force
